<!--
  Tistory skin HTML fix:
  Put this INSIDE <s_sidebar>, as its own <s_sidebar_element>.
  Do not place the iframe directly between <s_sidebar> and <s_sidebar_element>.
-->

<s_sidebar_element>
  <!-- 앱 홍보 배너 -->
  <div class="box-app-banner">
    <style>
      .box-app-banner {
        display: grid;
        gap: 12px;
        margin: 0 0 24px;
      }

      .box-app-banner .app-banner-frame {
        display: block;
        width: 100%;
        height: 170px;
        border: 0;
        overflow: hidden;
        border-radius: 24px;
      }

      @media (max-width: 560px) {
        .box-app-banner .app-banner-frame {
          height: 236px;
        }
      }
    </style>

    <iframe class="app-banner-frame" src="https://rujina0-maker.github.io/blog-banners/rolling.html" title="앱 롤링 배너" loading="lazy"></iframe>
  </div>
</s_sidebar_element>
